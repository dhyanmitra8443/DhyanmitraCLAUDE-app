# Ref: SRS 18.2-18.6 - Nginx is the only thing the internet ever touches
# directly. Everything the browser does goes through the frontend
# container's own /api/backend BFF proxy (backend reached over the internal
# Docker network, not through here) - the one exception is the Razorpay
# webhook, which Razorpay's servers must reach directly.
#
# Install: copy to /etc/nginx/sites-available/dhyanmitra.in.conf, symlink
# into sites-enabled, `nginx -t`, then reload. Run `certbot --nginx -d
# dhyanmitra.in -d www.dhyanmitra.in` afterwards - certbot rewrites the
# server block below to add the actual ssl_certificate directives and the
# HTTP->HTTPS redirect; the version here is the pre-certbot starting point.

server {
    listen 80;
    listen [::]:80;
    server_name dhyanmitra.in www.dhyanmitra.in;

    location /api/v1/payments/razorpay/webhook {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
