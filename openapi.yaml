openapi: 3.0.3
info:
  title: Dhyan Mitra LMS API
  version: "1.0.0"
  description: >
    REST API contract for the Dhyan Mitra Learning Management System (Yoga LMS),
    generated chapter-by-chapter from the SRS (SRS DOCUMENTAITON FOR DHYANMITRA
    WEBSITE.docx, v1.0). Each path/schema below references its originating SRS
    section for traceability (e.g. "Ref: SRS 3.4").

    Conventions used throughout this contract:
      - All IDs are UUID strings.
      - All timestamps are ISO-8601 UTC (e.g. 2026-07-13T10:30:00Z).
      - Every response is wrapped in the standard envelope defined in SRS 2.8:
        { "success": bool, "message": string, "data": ... }.
      - Errors use the same envelope shape with success=false and an "errors" array.
      - List endpoints are paginated using page (0-indexed), size, and sort
        query parameters, and return data.content + data.page metadata.
      - Every protected operation is tagged with a custom `x-roles` extension
        listing which of ADMINISTRATOR / INSTRUCTOR / STUDENT may call it.
        Endpoints with no `x-roles` and `security: []` are public/unauthenticated.
servers:
  - url: https://api.dhyanmitra.com/api/v1
    description: Production
  - url: https://staging-api.dhyanmitra.com/api/v1
    description: Staging

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Chapter 3 - Authentication & Authorization
  - name: Users
    description: Chapter 4 - User Management
  - name: Courses
    description: Chapter 5 - Course Management
  - name: Categories
    description: Chapter 6 - Category Management
  - name: Sections & Lessons
    description: Chapter 7 - Section & Lesson Management
  - name: Lesson Resources
    description: Chapter 8 - Lesson Resources & File Management
  - name: Subscriptions
    description: Chapter 9 - Subscription Plans & Student Enrollments
  - name: Payments
    description: Chapter 10 - Payment Management
  - name: Live Classes
    description: Chapter 11 - Live Classes
  - name: Progress & Certificates
    description: Chapter 12 - Student Progress Tracking & Certificate Management
  - name: Dashboard & Analytics
    description: Chapter 13 - Dashboard & Analytics
  - name: Notifications
    description: Chapter 14 - Notification Management
  - name: Reports
    description: Chapter 15 - Reports Management
  - name: Settings
    description: Chapter 16 - System Settings

paths:
  # ======================================================================
  # Chapter 3: Authentication & Authorization
  # ======================================================================
  /auth/register:
    post:
      tags: [Auth]
      summary: Student self-registration
      description: >
        Ref: SRS 3.4. Creates a new STUDENT account with ACTIVE status.
        Does not enroll the student in any course. Sends a welcome email
        asynchronously; email failure must not block registration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStudentRequest'
      responses:
        '201':
          description: Student registered successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email or mobile number already registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      description: >
        Ref: SRS 3.6, 3.7. Issues a JWT access + refresh token pair.
        Enforces the single-active-session policy: any existing active
        session for this user is invalidated first.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid credentials, inactive, or blocked account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout the current session
      description: "Ref: SRS 3.8. Revokes the refresh token and marks the session inactive."
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access token
      description: "Ref: SRS 3.12."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New access token issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Refresh token invalid, expired, or revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: "Ref: SRS 3.10. Reset tokens are single-use and expire after a configured duration."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: >
            Always returns success regardless of whether the email exists,
            to avoid leaking account existence.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete a password reset using a reset token
      description: "Ref: SRS 3.10. Invalidates all existing sessions on success."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword, confirmPassword]
              properties:
                token: { type: string }
                newPassword: { type: string, format: password }
                confirmPassword: { type: string, format: password }
      responses:
        '200':
          description: Password reset successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '400':
          description: Token invalid/expired, or password policy not met.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for the authenticated user
      description: "Ref: SRS 3.11. Invalidates existing sessions on success; user must log in again."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword, confirmPassword]
              properties:
                currentPassword: { type: string, format: password }
                newPassword: { type: string, format: password }
                confirmPassword: { type: string, format: password }
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/instructors/invitations:
    post:
      tags: [Auth]
      summary: Invite a new instructor
      description: >
        Ref: SRS 3.5. Administrator-only. Creates a single-use, expiring
        invitation and sends the invitation email.
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, firstName, lastName]
              properties:
                email: { type: string, format: email }
                firstName: { type: string }
                lastName: { type: string }
      responses:
        '201':
          description: Invitation created and email queued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /auth/instructors/invitations/{token}:
    get:
      tags: [Auth]
      summary: Validate an instructor invitation token
      description: >
        Not explicitly in SRS text but required to support SRS 3.5's flow -
        lets the frontend confirm a token is valid/unexpired before
        rendering the "set password" form.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Token is valid; returns the invited instructor's name/email for display.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          email: { type: string, format: email }
                          firstName: { type: string }
                          lastName: { type: string }
        '400':
          description: Token invalid, expired, or already used.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/instructors/accept-invitation:
    post:
      tags: [Auth]
      summary: Accept an instructor invitation and set password
      description: "Ref: SRS 3.5. Activates the instructor account."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirmPassword]
              properties:
                token: { type: string }
                password: { type: string, format: password }
                confirmPassword: { type: string, format: password }
      responses:
        '200':
          description: Instructor account activated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserSummary'
        '400':
          description: Token invalid/expired/already used, or password policy not met.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ======================================================================
  # Chapter 4: User Management
  # ======================================================================
  /users/me:
    get:
      tags: [Users]
      summary: Get the authenticated user's own profile
      description: "Ref: SRS 4.3."
      responses:
        '200':
          description: Current user's profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UserProfile' }
    patch:
      tags: [Users]
      summary: Update the authenticated user's own profile
      description: >
        "Ref: SRS 4.6 (Student editable fields), 4.7 (Instructor editable
        fields incl. bio/experience/specializations). Email, role, and
        account status are never editable via this endpoint."
      x-roles: [ADMINISTRATOR, INSTRUCTOR, STUDENT]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOwnProfileRequest' }
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UserProfile' }
        '400':
          $ref: '#/components/responses/ValidationError'

  /users/me/photo:
    post:
      tags: [Users]
      summary: Upload the authenticated user's profile photo
      description: "Ref: SRS 4.13. JPG/PNG only, max 5 MB."
      x-roles: [ADMINISTRATOR, INSTRUCTOR, STUDENT]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          description: Profile photo updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          profilePhotoUrl: { type: string, format: uri }
        '400':
          description: Invalid file type or size exceeds 5 MB.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /users:
    get:
      tags: [Users]
      summary: Search/list all users
      description: "Ref: SRS 4.9, 4.10, 4.11. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: search
          in: query
          description: Partial match against name, email, or mobile number.
          schema: { type: string }
        - name: role
          in: query
          schema: { $ref: '#/components/schemas/UserRole' }
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, INACTIVE, BLOCKED] }
        - name: registeredAfter
          in: query
          schema: { type: string, format: date }
        - name: registeredBefore
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Paginated user list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/UserSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get a user's complete profile
      description: >
        "Ref: SRS 4.12. Administrator-only. For students, includes
        subscriptions, progress, certificates, and payment history. For
        instructors, includes assigned courses, scheduled live classes,
        and student count."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Full user profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UserFullProfile' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Update a user's information (administrator)
      description: "Ref: SRS 4.5."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOwnProfileRequest' }
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UserFullProfile' }
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/status:
    patch:
      tags: [Users]
      summary: Block or activate a user account
      description: >
        "Ref: SRS 4.5, 4.4. Administrators cannot permanently delete users -
        this is the only status-changing operation available."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [ACTIVE, INACTIVE, BLOCKED] }
      responses:
        '200':
          description: Status updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================================================================
  # Chapter 5: Course Management
  # ======================================================================
  /courses:
    get:
      tags: [Courses]
      summary: List/search courses
      description: >
        "Ref: SRS 5.13, 5.14. Students/public see only PUBLISHED courses
        (Ref: SRS 5.9); administrators may additionally filter by status
        and creation/publication date."
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: search
          in: query
          description: Keyword match against course title.
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: array, items: { type: string, format: uuid } }
          style: form
          explode: true
        - name: instructorId
          in: query
          schema: { type: string, format: uuid }
        - name: difficultyLevel
          in: query
          schema: { type: string, enum: [BEGINNER, INTERMEDIATE, ADVANCED] }
        - name: language
          in: query
          schema: { type: string }
        - name: status
          in: query
          description: Administrator-only filter.
          schema: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
      responses:
        '200':
          description: Paginated course list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/CourseSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }
    post:
      tags: [Courses]
      summary: Create a course
      description: "Ref: SRS 5.5. Defaults to DRAFT status."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCourseRequest' }
      responses:
        '201':
          description: Course created as DRAFT.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CourseDetail' }
        '400':
          $ref: '#/components/responses/ValidationError'

  /courses/{courseId}:
    get:
      tags: [Courses]
      summary: Get course details
      description: "Ref: SRS 5.15."
      security: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Course details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CourseDetail' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Courses]
      summary: Update course information
      description: "Ref: SRS 5.11. Administrator, or an instructor assigned to this course."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCourseRequest' }
      responses:
        '200':
          description: Course updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CourseDetail' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /courses/{courseId}/publish:
    post:
      tags: [Courses]
      summary: Publish a course
      description: >
        "Ref: SRS 5.4. Requires at least one section/lesson, one category,
        one instructor, and one ACTIVE subscription plan (Ref: SRS 6.6, 7.3, 9.6)."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Course published.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '409':
          description: Course does not meet publish prerequisites.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /courses/{courseId}/archive:
    post:
      tags: [Courses]
      summary: Archive a course
      description: "Ref: SRS 5.12. Soft-delete; historical enrollments/certificates remain intact."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Course archived.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /courses/{courseId}/instructors:
    post:
      tags: [Courses]
      summary: Assign an instructor to a course
      description: "Ref: SRS 5.6, 4.8. Many-to-many relationship."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instructorId]
              properties:
                instructorId: { type: string, format: uuid }
      responses:
        '200':
          description: Instructor assigned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /courses/{courseId}/instructors/{instructorId}:
    delete:
      tags: [Courses]
      summary: Remove an instructor from a course
      description: "Ref: SRS 5.6."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: instructorId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Instructor removed from course.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /courses/{courseId}/categories:
    post:
      tags: [Courses]
      summary: Assign categories to a course
      description: "Ref: SRS 5.7, 6.6."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryIds]
              properties:
                categoryIds:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Categories assigned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /courses/{courseId}/categories/{categoryId}:
    delete:
      tags: [Courses]
      summary: Remove a category from a course
      description: "Ref: SRS 5.7."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: categoryId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Category removed from course.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  # ======================================================================
  # Chapter 6: Category Management
  # ======================================================================
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      description: >
        "Ref: SRS 6.9, 6.10, 6.11. Public callers see only ACTIVE categories
        that have at least one published course. Administrators may include
        inactive categories and search by name/status."
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          description: Administrator-only filter.
          schema: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Category list, sorted by displayOrder then name (Ref SRS 6.10).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/CategorySummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }
    post:
      tags: [Categories]
      summary: Create a category
      description: "Ref: SRS 6.5. Administrator-only."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '201':
          description: Category created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CategorySummary' }
        '409':
          description: Category name already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /categories/{categoryId}:
    get:
      tags: [Categories]
      summary: Get category details
      description: "Ref: SRS 6.3."
      security: []
      parameters:
        - name: categoryId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Category details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CategorySummary' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Categories]
      summary: Update a category
      description: "Ref: SRS 6.7. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: categoryId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '200':
          description: Category updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CategorySummary' }

  /categories/{categoryId}/status:
    patch:
      tags: [Categories]
      summary: Activate or deactivate a category
      description: "Ref: SRS 6.4, 6.8. Categories are never permanently deleted."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: categoryId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Status updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  # ======================================================================
  # Chapter 7: Section & Lesson Management
  # ======================================================================
  /courses/{courseId}/sections:
    get:
      tags: [Sections & Lessons]
      summary: Get the course outline (sections with nested lessons)
      description: "Ref: SRS 7.3, 7.9, 7.10. Students see only published sections/lessons they can access."
      security: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ordered list of sections, each with its ordered lessons.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SectionDetail' }
    post:
      tags: [Sections & Lessons]
      summary: Create a section within a course
      description: "Ref: SRS 7.4."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSectionRequest' }
      responses:
        '201':
          description: Section created as DRAFT.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SectionDetail' }

  /courses/{courseId}/sections/reorder:
    patch:
      tags: [Sections & Lessons]
      summary: Reorder sections within a course
      description: "Ref: SRS 7.10. Does not affect lesson completion records."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sectionIdsInOrder]
              properties:
                sectionIdsInOrder:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Sections reordered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /sections/{sectionId}:
    patch:
      tags: [Sections & Lessons]
      summary: Update a section
      description: "Ref: SRS 7.16."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: sectionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSectionRequest' }
      responses:
        '200':
          description: Section updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SectionDetail' }

  /sections/{sectionId}/publish:
    post:
      tags: [Sections & Lessons]
      summary: Publish a section
      description: "Ref: SRS 7.4. Requires at least one published lesson."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: sectionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Section published.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '409':
          description: Section has no published lessons.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /sections/{sectionId}/archive:
    post:
      tags: [Sections & Lessons]
      summary: Archive a section
      description: "Ref: SRS 7.17."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: sectionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Section archived.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /sections/{sectionId}/lessons:
    post:
      tags: [Sections & Lessons]
      summary: Create a lesson within a section
      description: "Ref: SRS 7.7."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: sectionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLessonRequest' }
      responses:
        '201':
          description: Lesson created as DRAFT.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LessonDetail' }

  /sections/{sectionId}/lessons/reorder:
    patch:
      tags: [Sections & Lessons]
      summary: Reorder lessons within a section
      description: "Ref: SRS 7.9. Does not reset student progress."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: sectionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lessonIdsInOrder]
              properties:
                lessonIdsInOrder:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Lessons reordered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /lessons/{lessonId}:
    get:
      tags: [Sections & Lessons]
      summary: Get lesson details
      description: >
        "Ref: SRS 7.14. Access requires the course/section/lesson to be
        published and the caller to have an active, unexpired subscription -
        except for the designated preview lesson (Ref: SRS 7.11)."
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lesson details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LessonDetail' }
        '403':
          description: No active subscription, or lesson not published.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Sections & Lessons]
      summary: Update a lesson
      description: "Ref: SRS 7.15. Does not reset student progress."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLessonRequest' }
      responses:
        '200':
          description: Lesson updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LessonDetail' }

  /lessons/{lessonId}/publish:
    post:
      tags: [Sections & Lessons]
      summary: Publish a lesson
      description: "Ref: SRS 7.6. Requires an active VIDEO resource (Ref: SRS 8.3, 8.7)."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lesson published.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '409':
          description: No active video resource attached.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /lessons/{lessonId}/archive:
    post:
      tags: [Sections & Lessons]
      summary: Archive a lesson
      description: "Ref: SRS 7.17."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lesson archived.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /lessons/{lessonId}/preview:
    patch:
      tags: [Sections & Lessons]
      summary: Set or unset this lesson as the course's preview lesson
      description: >
        "Ref: SRS 7.11. Exactly one lesson per course may be the preview
        lesson; setting a new one automatically unsets the previous one."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isPreview]
              properties:
                isPreview: { type: boolean }
      responses:
        '200':
          description: Preview flag updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  # ======================================================================
  # Chapter 8: Lesson Resources & File Management
  # ======================================================================
  /lessons/{lessonId}/resources:
    get:
      tags: [Lesson Resources]
      summary: List a lesson's resources
      description: "Ref: SRS 8.4, 8.11. Students see only ACTIVE resources of lessons they can access."
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Ordered list of resources.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/LessonResourceSummary' }
    post:
      tags: [Lesson Resources]
      summary: Add a resource to a lesson
      description: >
        "Ref: SRS 8.6. For VIDEO/EXTERNAL_LINK, provide externalUrl. For
        PDF/IMAGE/AUDIO/ZIP, first obtain an upload target via
        POST /lesson-resources/upload-url, upload the file there, then
        create the resource record with the returned fileReference."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLessonResourceRequest' }
      responses:
        '201':
          description: Resource created as ACTIVE.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LessonResourceSummary' }
        '409':
          description: Lesson already has an active VIDEO resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /lesson-resources/upload-url:
    post:
      tags: [Lesson Resources]
      summary: Obtain a pre-signed upload URL for a file resource
      description: >
        "Ref: SRS 8.8, 8.15. Files (PDF/IMAGE/AUDIO/ZIP) are uploaded
        directly to object storage using this pre-signed URL; the LMS
        database never stores binary content."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType]
              properties:
                fileName: { type: string }
                contentType: { type: string, example: application/pdf }
      responses:
        '200':
          description: Pre-signed upload URL and the file reference to use when creating the resource.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          uploadUrl: { type: string, format: uri }
                          fileReference: { type: string }
                          expiresInSeconds: { type: integer }

  /resources/{resourceId}:
    patch:
      tags: [Lesson Resources]
      summary: Update a lesson resource
      description: "Ref: SRS 8.13. Does not affect lesson completion records."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: resourceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLessonResourceRequest' }
      responses:
        '200':
          description: Resource updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LessonResourceSummary' }

  /resources/{resourceId}/archive:
    post:
      tags: [Lesson Resources]
      summary: Archive a lesson resource
      description: >
        "Ref: SRS 8.14. If this is the lesson's only active VIDEO resource,
        the lesson cannot remain PUBLISHED until a replacement is assigned."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: resourceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Resource archived.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '409':
          description: Cannot archive the only active video resource of a published lesson.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /resources/{resourceId}/download:
    get:
      tags: [Lesson Resources]
      summary: Get a short-lived download link for a resource
      description: >
        "Ref: SRS 8.12, 17.24 (private file access via pre-signed URLs).
        Applies to PDF/IMAGE/AUDIO/ZIP resources; VIDEO resources are
        streamed directly from their external URL instead."
      parameters:
        - name: resourceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pre-signed, time-limited download URL.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          downloadUrl: { type: string, format: uri }
                          expiresInSeconds: { type: integer }
        '403':
          $ref: '#/components/responses/Forbidden'

  # ======================================================================
  # Chapter 9: Subscription Plans & Student Enrollments
  # ======================================================================
  /courses/{courseId}/subscription-plans:
    get:
      tags: [Subscriptions]
      summary: List a course's subscription plans
      description: "Ref: SRS 9.6. Public callers see only ACTIVE plans; administrators see all."
      security: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Subscription plans for the course.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SubscriptionPlanSummary' }
    post:
      tags: [Subscriptions]
      summary: Create a subscription plan for a course
      description: "Ref: SRS 9.3, 9.15. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSubscriptionPlanRequest' }
      responses:
        '201':
          description: Plan created as ACTIVE.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SubscriptionPlanSummary' }

  /subscription-plans/{planId}:
    patch:
      tags: [Subscriptions]
      summary: Update a subscription plan
      description: "Ref: SRS 9.15. Does not affect subscriptions already purchased."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSubscriptionPlanRequest' }
      responses:
        '200':
          description: Plan updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /subscription-plans/{planId}/status:
    patch:
      tags: [Subscriptions]
      summary: Activate, deactivate, or archive a subscription plan
      description: "Ref: SRS 9.5, 9.15."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [ACTIVE, INACTIVE, ARCHIVED] }
      responses:
        '200':
          description: Status updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /subscriptions/me:
    get:
      tags: [Subscriptions]
      summary: List the authenticated student's own subscriptions
      description: "Ref: SRS 9.13, 9.18."
      x-roles: [STUDENT]
      responses:
        '200':
          description: Student's subscriptions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SubscriptionSummary' }

  /subscriptions:
    get:
      tags: [Subscriptions]
      summary: Search/list all subscriptions
      description: "Ref: SRS 9.16. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: studentName
          in: query
          schema: { type: string }
        - name: courseId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, EXPIRED, CANCELLED, PENDING] }
      responses:
        '200':
          description: Paginated subscription list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/SubscriptionSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /subscriptions/{subscriptionId}:
    get:
      tags: [Subscriptions]
      summary: Get subscription details
      description: "Ref: SRS 9.13. Administrator, or the owning student."
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Subscription details, including full history.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SubscriptionSummary' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Subscriptions]
      summary: Administrative correction of a subscription
      description: "Ref: SRS 9.14. Activate a pending subscription, extend it, or correct administrative errors."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [ACTIVE, EXPIRED, CANCELLED, PENDING] }
                endDate: { type: string, format: date }
      responses:
        '200':
          description: Subscription updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  # ======================================================================
  # Chapter 10: Payment Management (incl. 10.12 Razorpay Integration)
  # ======================================================================
  /orders:
    post:
      tags: [Payments]
      summary: Create an order for a course subscription plan
      description: "Ref: SRS 10.3, 10.4. Order starts in PENDING status."
      x-roles: [STUDENT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId, subscriptionPlanId]
              properties:
                courseId: { type: string, format: uuid }
                subscriptionPlanId: { type: string, format: uuid }
      responses:
        '201':
          description: Order created as PENDING.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OrderSummary' }
    get:
      tags: [Payments]
      summary: Search/list all orders
      description: "Ref: SRS 10.15. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: studentName
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, PAID, FAILED, CANCELLED] }
      responses:
        '200':
          description: Paginated order list (administrator view - all students).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/OrderSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /orders/me:
    get:
      tags: [Payments]
      summary: List the authenticated student's own orders
      description: "Ref: SRS 10.12 (Order History)."
      x-roles: [STUDENT]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated order history.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/OrderSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /orders/{orderId}:
    get:
      tags: [Payments]
      summary: Get order details
      description: "Ref: SRS 10.4. Administrator, or the owning student."
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Order details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OrderSummary' }
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{orderId}/razorpay-order:
    post:
      tags: [Payments]
      summary: Create the Razorpay Order for this LMS order
      description: >
        "Ref: SRS 10.12 (Order & Checkout Flow). Calls the Razorpay Orders
        API server-side and returns the fields needed to launch Razorpay
        Checkout on the client. The LMS never collects or stores raw card
        details - all card entry happens on Razorpay's hosted checkout."
      x-roles: [STUDENT]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Razorpay order created; use these fields to launch Checkout.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          razorpayOrderId: { type: string }
                          razorpayKeyId: { type: string }
                          amount: { type: integer, description: Amount in the smallest currency unit (paise). }
                          currency: { type: string, example: INR }

  /payments/razorpay/webhook:
    post:
      tags: [Payments]
      summary: Razorpay webhook receiver (server-to-server)
      description: >
        "Ref: SRS 10.12 (Webhook as Source of Truth, Signature Verification,
        Idempotency). Every event is verified via HMAC SHA256 against the
        configured webhook secret before processing; unverified requests
        are rejected and logged as a security event. Payment status is
        finalized ONLY through this webhook, never through the client-side
        checkout callback. Processing is idempotent per Razorpay event ID."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Razorpay's standard webhook event payload.
      responses:
        '200':
          description: Event processed (or already processed - idempotent no-op).
        '400':
          description: Signature verification failed.

  /payments/me:
    get:
      tags: [Payments]
      summary: List the authenticated student's own payment history
      description: "Ref: SRS 10.12 (Payment History)."
      x-roles: [STUDENT]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated payment history.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/PaymentSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /payments:
    get:
      tags: [Payments]
      summary: Search/list all payments
      description: "Ref: SRS 10.15. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, SUCCESS, FAILED, CANCELLED] }
        - name: transactionReference
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated payment list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/PaymentSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Get payment details
      description: "Ref: SRS 10.6. Administrator, or the owning student."
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Payment details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaymentSummary' }
        '404':
          $ref: '#/components/responses/NotFound'

  # ======================================================================
  # Chapter 11: Live Classes
  # ======================================================================
  /courses/{courseId}/live-classes:
    get:
      tags: [Live Classes]
      summary: List live classes for a course
      description: "Ref: SRS 11.8. Students see this only if they have an active subscription to the course."
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Live classes for this course.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/LiveClassSummary' }
        '403':
          description: No active subscription to this course.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    post:
      tags: [Live Classes]
      summary: Schedule a live class for a course
      description: "Ref: SRS 11.6, 11.7. Recurring schedules are not supported in Version 1."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLiveClassRequest' }
      responses:
        '201':
          description: Live class scheduled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LiveClassSummary' }

  /live-classes:
    get:
      tags: [Live Classes]
      summary: Search/list live classes across courses
      description: "Ref: SRS 11.14. Administrator/instructor view."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: courseId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [SCHEDULED, CANCELLED, COMPLETED] }
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Paginated live class list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/LiveClassSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /live-classes/{liveClassId}:
    get:
      tags: [Live Classes]
      summary: Get live class details
      description: "Ref: SRS 11.6."
      parameters:
        - name: liveClassId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Live class details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LiveClassSummary' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Live Classes]
      summary: Update a live class
      description: "Ref: SRS 11.12. Does not affect attendance history."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: liveClassId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateLiveClassRequest' }
      responses:
        '200':
          description: Live class updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /live-classes/{liveClassId}/cancel:
    post:
      tags: [Live Classes]
      summary: Cancel a scheduled live class
      description: "Ref: SRS 11.13."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: liveClassId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Live class cancelled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /live-classes/{liveClassId}/join:
    post:
      tags: [Live Classes]
      summary: Join a live class
      description: >
        "Ref: SRS 11.8, 11.9, 11.10. Records attendance automatically and
        returns the meeting URL. Requires an active subscription and a
        SCHEDULED live class."
      x-roles: [STUDENT]
      parameters:
        - name: liveClassId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Attendance recorded; meeting URL returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          meetingUrl: { type: string, format: uri }
                          meetingPassword: { type: string, nullable: true }
        '403':
          description: No active subscription, or live class not SCHEDULED.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /live-classes/{liveClassId}/recording:
    post:
      tags: [Live Classes]
      summary: Add a recording URL after the session completes
      description: >
        "Ref: SRS 11.11. Optional; must use the same private/unlisted,
        domain-restricted hosting requirement as lesson videos (Ref SRS 7.8)."
      x-roles: [ADMINISTRATOR, INSTRUCTOR]
      parameters:
        - name: liveClassId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recordingUrl]
              properties:
                recordingUrl: { type: string, format: uri }
      responses:
        '200':
          description: Recording URL added.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  # ======================================================================
  # Chapter 12: Student Progress Tracking & Certificate Management
  # ======================================================================
  /lessons/{lessonId}/progress/complete:
    post:
      tags: [Progress & Certificates]
      summary: Mark a lesson as completed
      description: >
        "Ref: SRS 12.4. Manual completion only in Version 1. Idempotent -
        completion is recorded once and reopening does not reset it."
      x-roles: [STUDENT]
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: >
            Lesson marked complete. If this was the final published lesson
            in the course, course completion and certificate generation are
            triggered (Ref SRS 12.9, 12.10 - see Pending Decision note there
            regarding completion rigor).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CourseProgressSummary' }

  /courses/{courseId}/progress/me:
    get:
      tags: [Progress & Certificates]
      summary: Get the authenticated student's own progress in a course
      description: "Ref: SRS 12.6."
      x-roles: [STUDENT]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Course progress.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CourseProgressSummary' }

  /courses/{courseId}/progress:
    get:
      tags: [Progress & Certificates]
      summary: List student progress for a course
      description: "Ref: SRS 12.7. Assigned instructors only, for their own courses."
      x-roles: [INSTRUCTOR, ADMINISTRATOR]
      parameters:
        - name: courseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated student progress for the course.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/CourseProgressSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /certificates/me:
    get:
      tags: [Progress & Certificates]
      summary: List the authenticated student's own certificates
      description: "Ref: SRS 12.12."
      x-roles: [STUDENT]
      responses:
        '200':
          description: Student's earned certificates.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/CertificateSummary' }

  /certificates:
    get:
      tags: [Progress & Certificates]
      summary: Search/list all certificates
      description: "Ref: SRS 12.15. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: studentName
          in: query
          schema: { type: string }
        - name: courseId
          in: query
          schema: { type: string, format: uuid }
        - name: certificateNumber
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated certificate list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/CertificateSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /certificates/{certificateId}:
    get:
      tags: [Progress & Certificates]
      summary: Get certificate details
      description: "Ref: SRS 12.11. Administrator, assigned instructor, or the owning student."
      parameters:
        - name: certificateId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Certificate details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CertificateSummary' }
        '404':
          $ref: '#/components/responses/NotFound'

  /certificates/{certificateId}/download:
    get:
      tags: [Progress & Certificates]
      summary: Download the certificate PDF
      description: "Ref: SRS 12.12, 17.24 (pre-signed, time-limited URL - not a permanent public link)."
      parameters:
        - name: certificateId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pre-signed, time-limited download URL for the certificate PDF.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          downloadUrl: { type: string, format: uri }
                          expiresInSeconds: { type: integer }
        '403':
          $ref: '#/components/responses/Forbidden'

  /certificates/verify/{verificationId}:
    get:
      tags: [Progress & Certificates]
      summary: Publicly verify a certificate's authenticity
      description: >
        "Ref: SRS 12.13, 12.17. Public, unauthenticated. Any visitor holding
        a valid, non-guessable verification identifier can confirm
        authenticity without logging in. Unknown/invalid identifiers return
        a generic not-found response with no data leakage."
      security: []
      parameters:
        - name: verificationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Certificate is valid.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          valid: { type: boolean, example: true }
                          studentName: { type: string }
                          courseName: { type: string }
                          completionDate: { type: string, format: date }
                          issueDate: { type: string, format: date }
                          certificateNumber: { type: string }
        '404':
          description: "Certificate not found - no student information is revealed."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ======================================================================
  # Chapter 13: Dashboard & Analytics
  # ======================================================================
  /dashboard/admin:
