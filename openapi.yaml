          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AdminDashboard' }

  /dashboard/instructor:
    get:
      tags: [Dashboard & Analytics]
      summary: Get the authenticated instructor's dashboard
      description: "Ref: SRS 13.5."
      x-roles: [INSTRUCTOR]
      responses:
        '200':
          description: Instructor dashboard KPIs and course summaries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/InstructorDashboard' }

  /dashboard/student:
    get:
      tags: [Dashboard & Analytics]
      summary: Get the authenticated student's dashboard
      description: "Ref: SRS 13.6."
      x-roles: [STUDENT]
      responses:
        '200':
          description: Student dashboard KPIs, continue-learning, and upcoming live classes.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/StudentDashboard' }

  /analytics/{analyticsType}:
    get:
      tags: [Dashboard & Analytics]
      summary: Get a named analytics summary
      description: >
        "Ref: SRS 13.9. Administrator-only. analyticsType selects one of
        the five summaries defined in SRS 13.9: students, courses, revenue,
        learning, live-classes."
      x-roles: [ADMINISTRATOR]
      parameters:
        - name: analyticsType
          in: path
          required: true
          schema:
            type: string
            enum: [students, courses, revenue, learning, live-classes]
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Analytics summary (shape depends on analyticsType).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { type: object }

  # ======================================================================
  # Chapter 14: Notification Management
  # ======================================================================
  /notifications/me:
    get:
      tags: [Notifications]
      summary: List the authenticated user's own notifications
      description: "Ref: SRS 14.7, 14.11."
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: readStatus
          in: query
          schema: { type: string, enum: [UNREAD, READ] }
      responses:
        '200':
          description: Paginated notification list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/NotificationSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  /notifications/{notificationId}/read:
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      description: "Ref: SRS 14.5. Users may only mark their own notifications."
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Notification marked as read.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '403':
          $ref: '#/components/responses/Forbidden'

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all of the authenticated user's notifications as read
      description: Not explicitly in SRS text but a standard convenience derived from SRS 14.7.
      responses:
        '200':
          description: All notifications marked as read.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /notifications:
    get:
      tags: [Notifications]
      summary: System-wide notification log
      description: "Ref: SRS 14.13. Administrator-only."
      x-roles: [ADMINISTRATOR]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: userId
          in: query
          schema: { type: string, format: uuid }
        - name: notificationType
          in: query
          schema: { type: string }
        - name: deliveryChannel
          in: query
          schema: { type: string, enum: [IN_APP, EMAIL] }
      responses:
        '200':
          description: Paginated system-wide notification log.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items: { $ref: '#/components/schemas/NotificationSummary' }
                          page: { $ref: '#/components/schemas/PageMeta' }

  # ======================================================================
  # Chapter 15: Reports Management
  # ======================================================================
  # NOTE: SRS 15.4-15.6 name ~17 distinct reports across the three roles.
  # Rather than one near-identical endpoint per report name, this contract
  # uses a single generic reportKey resource (Ref: SRS 15.3 role-based
  # access, 15.7-15.11 shared filter/sort/search/generation rules apply
  # identically to every report).
  /reports:
    get:
      tags: [Reports]
      summary: List report definitions available to the caller's role
      description: >
        "Ref: SRS 15.3. Returns the reportKey values (see ReportKey schema)
        the caller is permitted to run, based on role."
      responses:
        '200':
          description: Available report definitions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            reportKey: { $ref: '#/components/schemas/ReportKey' }
                            title: { type: string }

  /reports/{reportKey}:
    get:
      tags: [Reports]
      summary: Get report data
      description: >
        "Ref: SRS 15.4-15.11. Data shape depends on reportKey. Supports
        filtering (SRS 15.7), sorting (SRS 15.8), and search (SRS 15.10);
        results are always scoped to the caller's role/ownership (SRS 15.3,
        15.13)."
      parameters:
        - name: reportKey
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ReportKey' }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
        - name: courseId
          in: query
          schema: { type: string, format: uuid }
        - name: search
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Report data (shape depends on reportKey), paginated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          generatedAt: { type: string, format: date-time }
                          columns:
                            type: array
                            description: >
                              "The report's columns, in display order. Returned so a client
                              can render headers without hardcoding a column list per report,
                              and still render them when the result set is empty."
                            items:
                              type: object
                              properties:
                                key: { type: string }
                                label: { type: string }
                          content:
                            type: array
                            items: { type: object }
                          page: { $ref: '#/components/schemas/PageMeta' }
        '403':
          description: reportKey is not available to the caller's role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reports/{reportKey}/export:
    get:
      tags: [Reports]
      summary: Export a report
      description: >
        "Ref: SRS 15.9. Exported data reflects the same filters as the
        matching GET /reports/{reportKey} call. Large exports may be
        processed asynchronously per SRS 15.15 - in that case this returns
        202 with a pollable export job instead of the file directly."
      parameters:
        - name: reportKey
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ReportKey' }
        - name: format
          in: query
          required: true
          schema: { type: string, enum: [PDF, XLSX, CSV] }
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
        # The same filters GET /reports/{reportKey} accepts - without these, an
        # export could not actually reflect "the same filters" as the matching
        # data call, which is what SRS 15.9 requires.
        - name: courseId
          in: query
          schema: { type: string, format: uuid }
        - name: search
          in: query
          schema: { type: string }
      responses:
        '200':
          description: File stream in the requested format.
          content:
            application/pdf: { schema: { type: string, format: binary } }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: { schema: { type: string, format: binary } }
            text/csv: { schema: { type: string, format: binary } }
        '202':
          description: Export queued for asynchronous processing (large datasets).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          exportJobId: { type: string, format: uuid }

  /reports/exports/{exportJobId}:
    get:
      tags: [Reports]
      summary: Check status of / download an asynchronous report export
      description: "Ref: SRS 15.15."
      parameters:
        - name: exportJobId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Export status, with a download URL once ready.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, enum: [PROCESSING, READY, FAILED] }
                          downloadUrl:
                            type: string
                            format: uri
                            nullable: true
                            description: >
                              "Null until status is READY. A short-lived signed link
                              (not a permanent URL); re-poll to obtain a fresh one
                              after it expires."
                          expiresInSeconds: { type: integer, nullable: true }
        '403':
          description: The export was requested by a different user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ======================================================================
  # Chapter 16: System Settings
  # ======================================================================
  /settings:
    get:
      tags: [Settings]
      summary: Get all system settings
      description: "Ref: SRS 16.1-16.13. Administrator-only. Sensitive credential fields are masked in the response."
      x-roles: [ADMINISTRATOR]
      responses:
        '200':
          description: All system settings, grouped by category.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SystemSettings' }

  /settings/general:
    patch:
      tags: [Settings]
      summary: Update general/organization settings
      description: "Ref: SRS 16.4."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GeneralSettings' }
      responses:
        '200':
          description: General settings updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/authentication:
    patch:
      tags: [Settings]
      summary: Update authentication settings
      description: >
        "Ref: SRS 16.5. Password length/complexity overrides are bounded -
        length cannot go below 8 chars, and at least one letter class plus
        one digit-or-special-character requirement must always stay mandatory."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthenticationSettings' }
      responses:
        '200':
          description: Authentication settings updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }
        '400':
          description: Requested override violates the minimum policy bounds.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /settings/file-upload:
    patch:
      tags: [Settings]
      summary: Update file upload settings
      description: "Ref: SRS 16.6."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FileUploadSettings' }
      responses:
        '200':
          description: File upload settings updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/email:
    patch:
      tags: [Settings]
      summary: Update email/SMTP settings
      description: "Ref: SRS 16.7."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailSettings' }
      responses:
        '200':
          description: Email settings updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/notifications:
    patch:
      tags: [Settings]
      summary: Update notification channel toggles
      description: "Ref: SRS 16.8."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailNotificationsEnabled: { type: boolean }
                inAppNotificationsEnabled: { type: boolean }
      responses:
        '200':
          description: Notification settings updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/payment-gateway:
    patch:
      tags: [Settings]
      summary: Update Razorpay payment gateway configuration
      description: "Ref: SRS 16.9. Key Secret and Webhook Secret are write-only and never returned by GET /settings."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentGatewaySettings' }
      responses:
        '200':
          description: Payment gateway settings updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/live-class:
    patch:
      tags: [Settings]
      summary: Update default live class settings
      description: "Ref: SRS 16.10. Instructors may override these defaults per class."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LiveClassSettings' }
      responses:
        '200':
          description: Live class defaults updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/certificate:
    patch:
      tags: [Settings]
      summary: Update certificate branding settings
      description: "Ref: SRS 16.11. Applies only to newly generated certificates; previously issued certificates are unchanged."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CertificateSettings' }
      responses:
        '200':
          description: Certificate settings updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/maintenance-mode:
    patch:
      tags: [Settings]
      summary: Enable or disable maintenance mode
      description: "Ref: SRS 16.12. While enabled, only administrators may access the system."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '200':
          description: Maintenance mode toggled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

  /settings/backup-configuration:
    get:
      tags: [Settings]
      summary: Get backup configuration
      description: "Ref: SRS 16.13."
      x-roles: [ADMINISTRATOR]
      responses:
        '200':
          description: Backup configuration.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/BackupSettings' }
    patch:
      tags: [Settings]
      summary: Update backup configuration
      description: "Ref: SRS 16.13."
      x-roles: [ADMINISTRATOR]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BackupSettings' }
      responses:
        '200':
          description: Backup configuration updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiEnvelope' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
      description: Zero-indexed page number.
    SizeParam:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    SortParam:
      name: sort
      in: query
      schema: { type: string, example: "createdAt,desc" }
      description: "Format: {field},{asc|desc}"

  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated but not authorized for this resource/role.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    ApiEnvelope:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: "Operation completed successfully." }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    PageMeta:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer }
        totalPages: { type: integer }

    UserRole:
      type: string
      enum: [ADMINISTRATOR, INSTRUCTOR, STUDENT]

    RegisterStudentRequest:
      type: object
      required: [firstName, lastName, email, mobileNumber, password, confirmPassword]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        mobileNumber: { type: string }
        password: { type: string, format: password }
        confirmPassword: { type: string, format: password }

    UserSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/UserRole' }
        status: { type: string, enum: [ACTIVE, INACTIVE, BLOCKED] }

    AuthTokenResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string, example: Bearer }
        expiresInSeconds: { type: integer }
        user: { $ref: '#/components/schemas/UserSummary' }

    # -- Chapter 4: User Management --
    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        mobileNumber: { type: string }
        profilePhotoUrl: { type: string, format: uri, nullable: true }
        dateOfBirth: { type: string, format: date, nullable: true }
        gender: { type: string, nullable: true }
        role: { $ref: '#/components/schemas/UserRole' }
        status: { type: string, enum: [ACTIVE, INACTIVE, BLOCKED] }
        professionalBio: { type: string, nullable: true, description: Instructor only. }
        yearsOfExperience: { type: integer, nullable: true, description: Instructor only. }
        specializations:
          type: array
          nullable: true
          description: Instructor only.
          items: { type: string, example: "Meditation" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    UpdateOwnProfileRequest:
      type: object
      description: >
        Fields accepted depend on the caller's role (Ref: SRS 4.6/4.7);
        the server ignores fields not applicable to the caller's role.
      properties:
        firstName: { type: string }
        lastName: { type: string }
        mobileNumber: { type: string }
        dateOfBirth: { type: string, format: date }
        gender: { type: string }
        professionalBio: { type: string }
        yearsOfExperience: { type: integer }
        specializations:
          type: array
          items: { type: string }

    UserFullProfile:
      description: "Ref: SRS 4.12."
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - type: object
          properties:
            subscriptions:
              type: array
              description: Students only.
              items: { $ref: '#/components/schemas/SubscriptionSummary' }
            certificatesEarned:
              type: array
              description: Students only.
              items: { $ref: '#/components/schemas/CertificateSummary' }
            assignedCourses:
              type: array
              description: Instructors only.
              items: { $ref: '#/components/schemas/CourseSummary' }
            studentCount:
              type: integer
              description: Instructors only - total students across assigned courses.

    # -- Chapter 5: Course Management --
    CourseSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        shortDescription: { type: string }
        thumbnailUrl: { type: string, format: uri }
        language: { type: string }
        difficultyLevel: { type: string, enum: [BEGINNER, INTERMEDIATE, ADVANCED] }
        estimatedDurationMinutes: { type: integer }
        status: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
        instructors:
          type: array
          items: { $ref: '#/components/schemas/UserSummary' }
        categories:
          type: array
          items: { $ref: '#/components/schemas/CategorySummary' }
        lessonCount: { type: integer }
        publishedAt: { type: string, format: date-time, nullable: true }

    CourseDetail:
      allOf:
        - $ref: '#/components/schemas/CourseSummary'
        - type: object
          properties:
            detailedDescription: { type: string }
            subscriptionPlans:
              type: array
              items: { $ref: '#/components/schemas/SubscriptionPlanSummary' }
            previewLessonId: { type: string, format: uuid, nullable: true }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    CreateCourseRequest:
      type: object
      required: [title, shortDescription, detailedDescription, thumbnailUrl, language, difficultyLevel, instructorIds, categoryIds]
      properties:
        title: { type: string }
        shortDescription: { type: string }
        detailedDescription: { type: string }
        thumbnailUrl: { type: string, format: uri }
        language: { type: string }
        difficultyLevel: { type: string, enum: [BEGINNER, INTERMEDIATE, ADVANCED] }
        estimatedDurationMinutes: { type: integer }
        instructorIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        categoryIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }

    # -- Chapter 6: Category Management --
    CategorySummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        iconUrl: { type: string, format: uri, nullable: true }
        displayOrder: { type: integer }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
        courseCount: { type: integer }

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        iconUrl: { type: string, format: uri }
        displayOrder: { type: integer, minimum: 1 }

    # -- Chapter 7: Section & Lesson Management --
    SectionDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        courseId: { type: string, format: uuid }
        title: { type: string }
        shortDescription: { type: string, nullable: true }
        displayOrder: { type: integer }
        status: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
        lessons:
          type: array
          items: { $ref: '#/components/schemas/LessonSummary' }

    CreateSectionRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        shortDescription: { type: string }
        displayOrder: { type: integer }

    LessonSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        sectionId: { type: string, format: uuid }
        title: { type: string }
        shortDescription: { type: string, nullable: true }
        videoDurationSeconds: { type: integer }
        thumbnailUrl: { type: string, format: uri, nullable: true }
        displayOrder: { type: integer }
        status: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
        isPreview: { type: boolean }
        completionStatus:
          type: string
          nullable: true
          description: Populated only for the authenticated student caller (Ref SRS 12.3).
          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]

    LessonDetail:
      allOf:
        - $ref: '#/components/schemas/LessonSummary'
        - type: object
          properties:
            detailedDescription: { type: string, nullable: true }
            videoUrl:
              type: string
              format: uri
              description: >
                Private/unlisted, domain-restricted hosting required
                (Ref SRS 7.8).
            resources:
              type: array
              items: { $ref: '#/components/schemas/LessonResourceSummary' }

    CreateLessonRequest:
      type: object
      required: [title, videoUrl]
      properties:
        title: { type: string }
        detailedDescription: { type: string }
        videoUrl: { type: string, format: uri }
        thumbnailUrl: { type: string, format: uri }
        displayOrder: { type: integer }

    # -- Chapter 8: Lesson Resources & File Management --
    LessonResourceSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        lessonId: { type: string, format: uuid }
        resourceType: { type: string, enum: [VIDEO, PDF, IMAGE, AUDIO, ZIP, EXTERNAL_LINK] }
        displayName: { type: string }
        description: { type: string, nullable: true }
        externalUrl: { type: string, format: uri, nullable: true }
        fileReference: { type: string, nullable: true }
        fileSizeBytes: { type: integer, nullable: true }
        displayOrder: { type: integer }
        status: { type: string, enum: [ACTIVE, INACTIVE, ARCHIVED] }

    CreateLessonResourceRequest:
      type: object
      required: [resourceType, displayName]
      properties:
        resourceType: { type: string, enum: [VIDEO, PDF, IMAGE, AUDIO, ZIP, EXTERNAL_LINK] }
        displayName: { type: string }
        description: { type: string }
        externalUrl:
          type: string
          format: uri
          description: Required for VIDEO and EXTERNAL_LINK.
        fileReference:
          type: string
          description: Required for PDF/IMAGE/AUDIO/ZIP; obtained from POST /lesson-resources/upload-url.
        displayOrder: { type: integer }

    # -- Chapter 9: Subscription Plans & Student Enrollments --
    SubscriptionPlanSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        courseId: { type: string, format: uuid }
        planName: { type: string, example: Quarterly }
        description: { type: string, nullable: true }
        price: { type: number, format: decimal }
        currency: { type: string, example: INR }
        duration: { type: integer, example: 3 }
        durationUnit: { type: string, enum: [DAY, MONTH, YEAR] }
        status: { type: string, enum: [ACTIVE, INACTIVE, ARCHIVED] }

    CreateSubscriptionPlanRequest:
      type: object
      required: [planName, price, currency, duration, durationUnit]
      properties:
        planName: { type: string }
        description: { type: string }
        price: { type: number, format: decimal }
        currency: { type: string, default: INR }
        duration: { type: integer, minimum: 1 }
        durationUnit: { type: string, enum: [DAY, MONTH, YEAR] }

    SubscriptionSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        courseId: { type: string, format: uuid }
        course: { $ref: '#/components/schemas/CourseSummary' }
        subscriptionPlanId: { type: string, format: uuid }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { type: string, enum: [ACTIVE, EXPIRED, CANCELLED, PENDING] }
        purchaseDate: { type: string, format: date-time }

    # -- Chapter 10: Payment Management --
    OrderSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        courseId: { type: string, format: uuid }
        course: { $ref: '#/components/schemas/CourseSummary' }
        subscriptionPlanId: { type: string, format: uuid }
        amount: { type: number, format: decimal }
        currency: { type: string, example: INR }
        status: { type: string, enum: [PENDING, PAID, FAILED, CANCELLED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PaymentSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        amount: { type: number, format: decimal }
        currency: { type: string, example: INR }
        paymentMethod: { type: string, enum: [CREDIT_CARD, DEBIT_CARD, UPI, NET_BANKING, WALLET] }
        transactionReference:
          type: string
          description: Razorpay payment ID (Ref SRS 10.11).
        status: { type: string, enum: [PENDING, SUCCESS, FAILED, CANCELLED] }
        paymentDate: { type: string, format: date-time }

    # -- Chapter 11: Live Classes --
    LiveClassSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        courseId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        scheduledDate: { type: string, format: date }
        scheduledTime: { type: string, example: "07:00" }
        meetingUrl:
          type: string
          format: uri
          description: Visible only to authorized enrolled students/instructors/admins.
        recordingUrl: { type: string, format: uri, nullable: true }
        status: { type: string, enum: [SCHEDULED, CANCELLED, COMPLETED] }

    CreateLiveClassRequest:
      type: object
      required: [title, scheduledDate, scheduledTime, meetingUrl]
      properties:
        title: { type: string }
        description: { type: string }
        scheduledDate: { type: string, format: date }
        scheduledTime: { type: string, example: "07:00" }
        meetingUrl: { type: string, format: uri }
        meetingPassword: { type: string }

    # -- Chapter 12: Student Progress Tracking & Certificate Management --
    CourseProgressSummary:
      type: object
      properties:
        studentId: { type: string, format: uuid }
        courseId: { type: string, format: uuid }
        progressPercentage: { type: number, format: float, example: 75.0 }
        completedLessons: { type: integer }
        totalPublishedLessons: { type: integer }
        lastCompletedLessonId: { type: string, format: uuid, nullable: true }
        completionStatus: { type: string, enum: [IN_PROGRESS, COMPLETED] }
        courseCompletedAt: { type: string, format: date-time, nullable: true }

    CertificateSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        certificateNumber: { type: string }
        verificationId:
          type: string
          format: uuid
          description: Non-guessable identifier used by the public verification endpoint.
        studentId: { type: string, format: uuid }
        studentName: { type: string }
        courseId: { type: string, format: uuid }
        courseName: { type: string }
        instructorNames:
          type: array
          items: { type: string }
        completionDate: { type: string, format: date }
        issueDate: { type: string, format: date }

    # -- Chapter 13: Dashboard & Analytics --
    AdminDashboard:
      type: object
      description: "Ref: SRS 13.4."
      properties:
        totalRegisteredStudents: { type: integer }
        totalActiveStudents: { type: integer }
        totalInstructors: { type: integer }
        totalCourses: { type: integer }
        publishedCourses: { type: integer }
        draftCourses: { type: integer }
        archivedCourses: { type: integer }
        totalCategories: { type: integer }
        totalLiveClasses: { type: integer }
        scheduledLiveClasses: { type: integer }
        completedLiveClasses: { type: integer }
        totalSubscriptionPlans: { type: integer }
        activeSubscriptions: { type: integer }
        expiredSubscriptions: { type: integer }
        totalOrders: { type: integer }
        successfulPayments: { type: integer }
        failedPayments: { type: integer }
        totalRevenue: { type: number, format: decimal }
        certificatesIssued: { type: integer }
        recentActivities:
          type: array
          items: { $ref: '#/components/schemas/RecentActivity' }

    InstructorDashboard:
      type: object
      description: "Ref: SRS 13.5."
      properties:
        totalAssignedCourses: { type: integer }
        publishedCourses: { type: integer }
        draftCourses: { type: integer }
        totalEnrolledStudents: { type: integer }
        upcomingLiveClasses: { type: integer }
        completedLiveClasses: { type: integer }
        certificatesIssuedForAssignedCourses: { type: integer }
        courseSummaries:
          type: array
          items:
            type: object
            properties:
              courseId: { type: string, format: uuid }
              courseName: { type: string }
              totalStudents: { type: integer }
              activeStudents: { type: integer }
              nextLiveClassAt: { type: string, format: date-time, nullable: true }
              courseStatus: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
        recentActivities:
          type: array
          items: { $ref: '#/components/schemas/RecentActivity' }

    StudentDashboard:
      type: object
      description: "Ref: SRS 13.6."
      properties:
        activeCourses: { type: integer }
        completedCourses: { type: integer }
        overallLearningProgress: { type: number, format: float }
        upcomingLiveClasses:
          type: array
          items: { $ref: '#/components/schemas/LiveClassSummary' }
        continueLearning:
          type: object
          nullable: true
          properties:
            courseId: { type: string, format: uuid }
            lastCompletedLessonId: { type: string, format: uuid, nullable: true }
            nextLessonId: { type: string, format: uuid, nullable: true }
        myCourses:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/CourseSummary'
              - type: object
                properties:
                  progressPercentage: { type: number, format: float }
                  subscriptionExpiryDate: { type: string, format: date }
        certificates:
          type: array
          items: { $ref: '#/components/schemas/CertificateSummary' }
        recentActivities:
          type: array
          items: { $ref: '#/components/schemas/RecentActivity' }

    RecentActivity:
      type: object
      properties:
        type: { type: string, example: PAYMENT_SUCCESSFUL }
        message: { type: string }
        occurredAt: { type: string, format: date-time }

    # -- Chapter 14: Notification Management --
    NotificationSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        recipientUserId: { type: string, format: uuid }
        title: { type: string }
        message: { type: string }
        notificationType: { type: string, enum: [IN_APP, EMAIL] }
        relatedModule: { type: string, nullable: true }
        relatedEntityId: { type: string, format: uuid, nullable: true }
        readStatus: { type: string, enum: [UNREAD, READ] }
        createdAt: { type: string, format: date-time }
        readAt: { type: string, format: date-time, nullable: true }

    # -- Chapter 15: Reports Management --
    ReportKey:
      type: string
      description: "Ref: SRS 15.4 (student), 15.5 (instructor), 15.6 (administrator)."
      enum:
        # Student (SRS 15.4)
        - STUDENT_MY_COURSES
        - STUDENT_PAYMENT_HISTORY
        - STUDENT_CERTIFICATES
        - STUDENT_LIVE_CLASS_ATTENDANCE
        # Instructor (SRS 15.5)
        - INSTRUCTOR_COURSE_ENROLLMENT
        - INSTRUCTOR_STUDENT_PROGRESS
        - INSTRUCTOR_LIVE_CLASSES
        - INSTRUCTOR_CERTIFICATES
        # Administrator (SRS 15.6)
        - ADMIN_USERS
        - ADMIN_COURSES
        - ADMIN_CATEGORIES
        - ADMIN_SUBSCRIPTIONS
        - ADMIN_PAYMENTS
        - ADMIN_LIVE_CLASSES
        - ADMIN_CERTIFICATES
        - ADMIN_REVENUE
        - ADMIN_LEARNING_ANALYTICS

    # -- Chapter 16: System Settings --
    GeneralSettings:
      type: object
      properties:
        organizationName: { type: string }
        organizationLogoUrl: { type: string, format: uri }
        supportEmail: { type: string, format: email }
        supportPhone: { type: string }
        websiteUrl: { type: string, format: uri }
        organizationAddress: { type: string }

    AuthenticationSettings:
      type: object
      properties:
        sessionTimeoutMinutes: { type: integer }
        maxLoginAttempts: { type: integer }
        passwordMinLength: { type: integer, minimum: 8, maximum: 64 }
        passwordComplexity:
          type: object
          description: At least one letter class and one digit-or-special requirement must remain true.
          properties:
            requireUppercase: { type: boolean }
            requireLowercase: { type: boolean }
            requireDigit: { type: boolean }
            requireSpecialChar: { type: boolean }

    FileUploadSettings:
      type: object
      properties:
        maxUploadSizeMb: { type: integer }
        allowedFileTypes:
          type: array
          items: { type: string, example: pdf }
        maxFilesPerUpload: { type: integer }

    EmailSettings:
      type: object
      description: >
        "Ref: SRS 16.7 - including the chapter's 'Authentication Credentials'.
        smtpPassword is write-only: it is stored encrypted and never returned
        by GET /settings (see EmailSettingsView)."
      properties:
        smtpHost: { type: string }
        smtpPort: { type: integer }
        senderEmail: { type: string, format: email }
        senderDisplayName: { type: string }
        smtpUsername: { type: string }
        smtpPassword: { type: string, writeOnly: true }
        encryptionType: { type: string, enum: [SSL, TLS] }

    EmailSettingsView:
      type: object
      description: >
        "Ref: SRS 16.7 - the read shape of EmailSettings. The SMTP password is
        never echoed back; smtpPasswordConfigured tells an admin UI whether one
        is set without exposing it."
      properties:
        smtpHost: { type: string }
        smtpPort: { type: integer }
        senderEmail: { type: string, format: email }
        senderDisplayName: { type: string }
        smtpUsername: { type: string }
        smtpPasswordConfigured: { type: boolean }
        encryptionType: { type: string, enum: [SSL, TLS] }

    PaymentGatewaySettings:
      type: object
      description: "Ref: SRS 16.9."
      properties:
        razorpayKeyId: { type: string }
        razorpayKeySecret: { type: string, writeOnly: true }
        razorpayWebhookSecret: { type: string, writeOnly: true }
        webhookCallbackUrl: { type: string, format: uri }
        environment: { type: string, enum: [SANDBOX, PRODUCTION] }

    PaymentGatewaySettingsView:
      type: object
      description: >
        "Ref: SRS 16.9 - the read shape of PaymentGatewaySettings. Key Secret and
        Webhook Secret are write-only, so GET reports only whether each is
        configured."
      properties:
        razorpayKeyId: { type: string }
        razorpayKeySecretConfigured: { type: boolean }
        razorpayWebhookSecretConfigured: { type: boolean }
        webhookCallbackUrl: { type: string, format: uri }
        environment: { type: string, enum: [SANDBOX, PRODUCTION] }

    LiveClassSettings:
      type: object
      description: "Ref: SRS 16.10 - defaults; instructors may override these per class."
      properties:
        defaultTimeZone: { type: string, example: Asia/Kolkata }
        defaultMeetingDurationMinutes: { type: integer }
        defaultReminderMinutesBefore: { type: integer }

    CertificateSettings:
      type: object
      description: "Ref: SRS 16.11 - applies only to newly generated certificates."
      properties:
        organizationName: { type: string }
        organizationLogoUrl: { type: string, format: uri }
        signatureImageUrl: { type: string, format: uri }
        footerText: { type: string }

    BackupSettings:
      type: object
      properties:
        backupLocation: { type: string }
        backupFrequency: { type: string, enum: [DAILY, WEEKLY] }
        retentionDays: { type: integer }

    SystemSettings:
      type: object
      description: >
        "Ref: SRS 16.1-16.13. Every settings group that has a PATCH endpoint is
        also readable here - including liveClass (16.10) and certificate (16.11),
        without which an admin UI could write those groups but never populate
        their forms. Credential fields are never returned; the email and
        paymentGateway groups use their *View shapes, which report only whether
        each secret is configured."
      properties:
        general: { $ref: '#/components/schemas/GeneralSettings' }
        authentication: { $ref: '#/components/schemas/AuthenticationSettings' }
        fileUpload: { $ref: '#/components/schemas/FileUploadSettings' }
        email: { $ref: '#/components/schemas/EmailSettingsView' }
        notifications:
          type: object
          properties:
            emailNotificationsEnabled: { type: boolean }
            inAppNotificationsEnabled: { type: boolean }
        paymentGateway: { $ref: '#/components/schemas/PaymentGatewaySettingsView' }
        liveClass: { $ref: '#/components/schemas/LiveClassSettings' }
        certificate: { $ref: '#/components/schemas/CertificateSettings' }
        backup: { $ref: '#/components/schemas/BackupSettings' }
        maintenanceModeEnabled: { type: boolean }
        updatedAt: { type: string, format: date-time }
