# Production stack (Ref: SRS 18.2, 18.9). Nginx runs on the host (not in
# this compose file) and is the only thing reachable from the internet -
# every service here binds to 127.0.0.1 only, or (postgres) isn't published
# at all. Contrast with docker-compose.yml (local dev): that one exposes
# postgres on a host port and has no frontend service since the frontend
# runs via `npm run dev` locally instead.
services:
  postgres:
    image: postgres:16-alpine
    container_name: dhyanmitra-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dhyanmitra_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No `ports:` - only reachable from other containers on this compose
    # network (Ref: SRS 18.2 - "the database shall never be exposed
    # directly to the internet").

  backend:
    build:
      context: ./backend
    container_name: dhyanmitra-prod-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      STORAGE_LOCAL_PATH: /app/uploads
      # Optional - blank is fine at first boot (RazorpayApiClient rejects
      # order creation with a clear error rather than silently misbehaving);
      # add these once real Razorpay live-mode credentials exist.
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    volumes:
      - dhyanmitra_prod_uploads_data:/app/uploads
    ports:
      - "127.0.0.1:8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: dhyanmitra-prod-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Server-side only (Ref: frontend/src/lib/api/server.ts) - the browser
      # never talks to this directly, it goes through the frontend's own
      # /api/backend BFF proxy, which reaches the backend over this same
      # Docker network by service name.
      BACKEND_URL: http://backend:8080
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  dhyanmitra_prod_postgres_data:
  dhyanmitra_prod_uploads_data:
