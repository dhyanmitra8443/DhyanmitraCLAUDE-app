# Ref: SRS 19.7 - Application configuration shall be externalized.
# Profile-specific values (application-{profile}.yml) override these; secrets
# always come from environment variables, never hardcoded here or in git.
spring:
  application:
    name: lms-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      # Ref: SRS 2.6, 19.8 - Flyway is the *only* source of schema truth;
      # Hibernate must never create/alter tables itself.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  mail:
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 5MB   # Ref: SRS 4.13 - profile photo upload ceiling
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never # Ref: SRS 17.9 - never leak internals in error responses

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}      # 15 minutes
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000} # 30 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@dhyanmitra.com}
  storage:
    # Ref: SRS 2.13 - dev-stage local disk; swap for real object storage in
    # staging/prod by pointing FileStorageService's implementation elsewhere.
    local-path: ${STORAGE_LOCAL_PATH:/app/uploads}
  razorpay:
    # Ref: SRS 10.12, 18.24 - blank by default; RazorpayApiClient rejects
    # order creation with a clear error rather than calling out with empty
    # credentials. Webhook signature verification is independently
    # testable by signing a payload with this same configured secret.
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:dev-only-webhook-secret-change-me}
  certificate:
    # Ref: SRS 12.10, 12.11 - snapshotted onto every issued certificate.
    # founder-name has no real value supplied yet - set CERTIFICATE_FOUNDER_NAME
    # before this goes anywhere near production.
    # Ref: SRS 16.11 - an administrator's PATCH /settings/certificate overrides
    # organization-name; these remain the fallback until they do.
    organization-name: ${CERTIFICATE_ORGANIZATION_NAME:DYJK Dhyan Mitra}
    founder-name: ${CERTIFICATE_FOUNDER_NAME:Founder Name Pending}
  settings:
    # Ref: SRS 16.9, 17.24 - passphrase for the AES-GCM encryption of the
    # administrator-supplied credentials stored in system_settings (Razorpay
    # key secret / webhook secret, SMTP password). No default here on purpose:
    # like JWT_SECRET, a real value must be supplied by the environment, and
    # the app should refuse to start rather than protect production secrets
    # with a well-known passphrase. Rotating it makes stored secrets
    # undecryptable - they read as "not configured" and the env fallback takes
    # over until an admin re-enters them.
    encryption-key: ${SETTINGS_ENCRYPTION_KEY}

# Ref: SRS 2.14, 17.18 - Spring Boot Actuator + Prometheus monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
