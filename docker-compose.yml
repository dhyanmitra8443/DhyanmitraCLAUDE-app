# Local development stack for the Dhyan Mitra LMS backend (Ref: SRS 2.13, 19.9).
#
# NOTE: container names, host ports, and the .env-driven DB name/user below
# are deliberately distinct from the unrelated C:\Dhyan-app project running
# on this same machine (its Postgres container binds host port 5432) -
# this stack uses 5434 to guarantee no collision.
services:
  postgres:
    image: postgres:16-alpine
    container_name: dhyanmitra-claude-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dhyanmitra_claude_db}
      POSTGRES_USER: ${DB_USERNAME:-dhyanmitra_claude_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
    ports:
      - "5434:5432"
    volumes:
      - dhyanmitra_claude_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dhyanmitra_claude_user} -d ${DB_NAME:-dhyanmitra_claude_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # SMTP catcher for local dev (Ref: SRS 2.11, 14.8 - async email notifications).
  # application-dev.yml points spring.mail at this by default; without it the
  # backend's mail health indicator reports DOWN even though nothing else is wrong.
  mailpit:
    image: axllent/mailpit:latest
    container_name: dhyanmitra-claude-mailpit
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  backend:
    build:
      context: ./backend
    container_name: dhyanmitra-claude-backend
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dhyanmitra_claude_db}
      DB_USERNAME: ${DB_USERNAME:-dhyanmitra_claude_user}
      DB_PASSWORD: ${DB_PASSWORD:-dev_local_password_change_me}
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me-32-bytes-min}
      # Ref: SRS 16.9, 17.24 - encrypts the admin-supplied credentials stored in
      # system_settings. Override in the git-ignored .env for anything real.
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-dev-only-settings-encryption-key-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Defaults to the local Mailpit catcher; a git-ignored .env file at the
      # repo root can override these to point at a real SMTP provider
      # (Ref: SRS 18.24 - secrets never hardcoded or committed).
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      MAIL_FROM: ${MAIL_FROM:-}
      STORAGE_LOCAL_PATH: /app/uploads
    volumes:
      - dhyanmitra_claude_uploads_data:/app/uploads
    ports:
      - "8080:8080"

volumes:
  dhyanmitra_claude_postgres_data:
  dhyanmitra_claude_uploads_data:
